<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飲み会 割り勘計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1928;
            --surface2: #22213a;
            --accent: #ff6b35;
            --accent2: #ffd23f;
            --accent3: #06d6a0;
            --accent4: #a855f7;
            --text: #fffffe;
            --text-muted: #a7a9be;
            --border: rgba(255,255,255,0.08);
        }

        /* 修正: 全角や不正な記号をアスタリスクに変更 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            padding: 24px 16px 60px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 8px;
        }

        .header-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            padding: 4px 12px;
            border-radius: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
            font-weight: 300;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .input-group input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 20px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            padding: 12px 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 16px;
        }

        .input-suffix {
            position: relative;
        }
        .input-suffix input {
            padding-right: 36px;
        }
        .input-suffix span {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .special-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .add-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-btn:hover {
            background: var(--accent);
            color: white;
        }

        .special-person {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .special-person-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
