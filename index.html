<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲み会 割り勘計算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --surface2: #22213a;
    --accent: #ff6b35;
    --accent2: #ffd23f;
    --accent3: #06d6a0;
    --accent4: #a855f7;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
min-height: 100vh;
padding: 24px 16px 60px;
position: relative;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
top: -200px; left: -200px;
width: 600px; height: 600px;
background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}
body::after {
content: ‘’;
position: fixed;
bottom: -100px; right: -100px;
width: 500px; height: 500px;
background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.container {
max-width: 600px;
margin: 0 auto;
position: relative;
z-index: 1;
}

header {
text-align: center;
margin-bottom: 32px;
padding-top: 8px;
}

.header-badge {
display: inline-block;
background: var(–accent);
color: white;
font-family: ‘Space Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
padding: 4px 12px;
border-radius: 2px;
margin-bottom: 12px;
text-transform: uppercase;
}

h1 {
font-size: 32px;
font-weight: 900;
letter-spacing: -1px;
line-height: 1.1;
}

h1 span {
color: var(–accent);
}

.subtitle {
color: var(–text-muted);
font-size: 13px;
margin-top: 6px;
font-weight: 300;
}

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 24px;
margin-bottom: 16px;
}

.card-title {
font-size: 11px;
font-family: ‘Space Mono’, monospace;
color: var(–text-muted);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
}

.card-title::before {
content: ‘’;
width: 3px;
height: 14px;
background: var(–accent);
border-radius: 2px;
}

.input-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 8px;
}

.input-group {
display: flex;
flex-direction: column;
gap: 6px;
}

.input-group label {
font-size: 12px;
color: var(–text-muted);
font-weight: 400;
}

.input-group input {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
color: var(–text);
font-size: 20px;
font-family: ‘Space Mono’, monospace;
font-weight: 700;
padding: 12px 14px;
width: 100%;
outline: none;
transition: border-color 0.2s;
}

.input-group input:focus {
border-color: var(–accent);
}

.input-group input::placeholder {
color: rgba(255,255,255,0.2);
font-size: 16px;
}

.input-suffix {
position: relative;
}
.input-suffix input {
padding-right: 36px;
}
.input-suffix span {
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–text-muted);
font-size: 14px;
pointer-events: none;
}

/* ── 特別負担者セクション ── */
.special-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 14px;
}

.add-btn {
background: transparent;
border: 1px solid var(–accent);
color: var(–accent);
border-radius: 8px;
padding: 5px 12px;
font-size: 12px;
font-family: ‘Noto Sans JP’, sans-serif;
cursor: pointer;
transition: all 0.2s;
}
.add-btn:hover {
background: var(–accent);
color: white;
}

.special-person {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 10px;
animation: slideIn 0.25s ease;
}

@keyframes slideIn {
from { opacity: 0; transform: translateY(-8px); }
to   { opacity: 1; transform: translateY(0); }
}

.special-person-top {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 10px;
}

.person-name-input {
background: transparent;
border: none;
border-bottom: 1px solid var(–border);
color: var(–text);
font-size: 14px;
font-family: ‘Noto Sans JP’, sans-serif;
padding: 2px 4px;
flex: 1;
outline: none;
transition: border-color 0.2s;
}
.person-name-input:focus { border-color: var(–accent); }

.remove-btn {
background: transparent;
border: none;
color: rgba(255,255,255,0.3);
font-size: 18px;
cursor: pointer;
line-height: 1;
padding: 0 4px;
transition: color 0.2s;
}
.remove-btn:hover { color: #ff4757; }

.slider-row {
display: flex;
align-items: center;
gap: 12px;
}

.slider-label {
font-size: 12px;
color: var(–text-muted);
white-space: nowrap;
min-width: 60px;
}

input[type=“range”] {
-webkit-appearance: none;
width: 100%;
height: 4px;
background: var(–surface);
border-radius: 2px;
outline: none;
cursor: pointer;
flex: 1;
}

input[type=“range”]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
box-shadow: 0 0 8px rgba(255,107,53,0.5);
transition: transform 0.15s;
}
input[type=“range”]::-webkit-slider-thumb:hover {
transform: scale(1.2);
}

.slider-val {
font-family: ‘Space Mono’, monospace;
font-size: 14px;
font-weight: 700;
color: var(–accent2);
min-width: 38px;
text-align: right;
}

/* ── 計算ボタン ── */
.calc-btn {
width: 100%;
padding: 16px;
background: var(–accent);
border: none;
border-radius: 14px;
color: white;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 16px;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.5px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}

.calc-btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
transform: translateX(-100%);
transition: transform 0.4s;
}

.calc-btn:hover::after { transform: translateX(100%); }
.calc-btn:hover { background: #ff8255; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,107,53,0.35); }
.calc-btn:active { transform: translateY(0); }

/* ── 結果 ── */
#result-section {
display: none;
animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }
}

.summary-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 16px;
}

.summary-tile {
background: var(–surface2);
border-radius: 12px;
padding: 14px 16px;
border: 1px solid var(–border);
}

.summary-tile.highlight {
background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05));
border-color: rgba(255,107,53,0.3);
grid-column: span 2;
}

.tile-label {
font-size: 11px;
color: var(–text-muted);
margin-bottom: 4px;
}

.tile-value {
font-family: ‘Space Mono’, monospace;
font-size: 22px;
font-weight: 700;
color: var(–text);
}

.tile-value.big {
font-size: 30px;
color: var(–accent2);
}

.tile-sub {
font-size: 11px;
color: var(–text-muted);
margin-top: 2px;
}

/* ── 人別リスト ── */
.person-result {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 0;
border-bottom: 1px solid var(–border);
}
.person-result:last-child { border-bottom: none; }

.pr-left { display: flex; align-items: center; gap: 10px; }

.pr-dot {
width: 10px; height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.pr-name {
font-size: 14px;
font-weight: 700;
}

.pr-tag {
font-size: 10px;
background: rgba(255,107,53,0.2);
color: var(–accent);
padding: 2px 6px;
border-radius: 4px;
}

.pr-right {
text-align: right;
}

.pr-amount {
font-family: ‘Space Mono’, monospace;
font-size: 18px;
font-weight: 700;
}

.pr-pct {
font-size: 11px;
color: var(–text-muted);
}

/* ── 円グラフ ── */
.chart-wrap {
display: flex;
align-items: center;
justify-content: center;
padding: 8px 0 4px;
gap: 20px;
flex-wrap: wrap;
}

#pie-canvas {
filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
}

.legend {
display: flex;
flex-direction: column;
gap: 8px;
}

.legend-item {
display: flex;
align-items: center;
gap: 8px;
font-size: 13px;
}

.legend-dot {
width: 10px; height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.legend-pct {
font-family: ‘Space Mono’, monospace;
font-weight: 700;
margin-left: auto;
font-size: 12px;
}

/* ── 経費メモ ── */
.expense-box {
background: var(–surface2);
border: 1px dashed rgba(6,214,160,0.3);
border-radius: 12px;
padding: 16px;
}

.expense-title {
font-size: 12px;
color: var(–accent3);
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 6px;
font-family: ‘Space Mono’, monospace;
letter-spacing: 1px;
}

.expense-row {
display: flex;
justify-content: space-between;
font-size: 13px;
padding: 5px 0;
border-bottom: 1px solid rgba(255,255,255,0.05);
}
.expense-row:last-child { border-bottom: none; }

.expense-row span:last-child {
font-family: ‘Space Mono’, monospace;
font-weight: 700;
color: var(–accent3);
}

/* ── 端数調整メモ ── */
.rounding-note {
font-size: 11px;
color: var(–text-muted);
text-align: center;
margin-top: 8px;
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">🍺 NOMIKAI CALC</div>
    <h1>飲み会<span>割り勘</span><br>計算機</h1>
    <p class="subtitle">上司の多め払いも、負担割合もひと目でわかる</p>
  </header>

  <!-- 基本情報 -->

  <div class="card">
    <div class="card-title">基本情報</div>
    <div class="input-row">
      <div class="input-group input-suffix">
        <label>合計金額</label>
        <input type="number" id="total" placeholder="50000" min="0">
        <span>円</span>
      </div>
      <div class="input-group input-suffix">
        <label>参加人数</label>
        <input type="number" id="people" placeholder="8" min="1" max="50">
        <span>人</span>
      </div>
    </div>
  </div>

  <!-- 特別負担者 -->

  <div class="card">
    <div class="special-header">
      <div class="card-title" style="margin-bottom:0">多めに払う人</div>
      <button class="add-btn" onclick="addPerson()">＋ 追加</button>
    </div>
    <div id="special-list"></div>
    <p style="font-size:12px;color:var(--text-muted);margin-top:4px;">
      スライダーで「通常の何倍払うか」を設定します（例: 2.0 = 2倍）
    </p>
  </div>

<button class="calc-btn" onclick="calculate()">計算する 🍺</button>

  <!-- 結果 -->

  <div id="result-section">

```
<div class="card">
  <div class="card-title">計算結果</div>
  <div class="summary-grid">
    <div class="summary-tile highlight">
      <div class="tile-label">一般参加者（1人あたり）</div>
      <div class="tile-value big" id="res-normal">—</div>
      <div class="tile-sub" id="res-count">—</div>
    </div>
    <div class="summary-tile">
      <div class="tile-label">合計金額</div>
      <div class="tile-value" id="res-total">—</div>
    </div>
    <div class="summary-tile">
      <div class="tile-label">参加人数</div>
      <div class="tile-value" id="res-people">—</div>
    </div>
  </div>

  <div id="person-list"></div>
  <div class="rounding-note" id="rounding-note"></div>
</div>

<!-- 円グラフ -->
<div class="card">
  <div class="card-title">負担割合</div>
  <div class="chart-wrap">
    <canvas id="pie-canvas" width="180" height="180"></canvas>
    <div class="legend" id="chart-legend"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">経費精算メモ</div>
  <div class="expense-box">
    <div class="expense-title">💼 EXPENSE SUMMARY</div>
    <div id="expense-rows"></div>
  </div>
</div>

  </div>
</div>

<script>
const COLORS = ['#ff6b35','#ffd23f','#06d6a0','#a855f7','#38bdf8','#f472b6','#fb923c','#34d399'];

let specialPeople = [];
let pidCounter = 0;

function addPerson() {
  const id = ++pidCounter;
  specialPeople.push({ id, name: '上司', ratio: 2.0 });
  renderSpecialList();
}

function removePerson(id) {
  specialPeople = specialPeople.filter(p => p.id !== id);
  renderSpecialList();
}

function renderSpecialList() {
  const container = document.getElementById('special-list');
  container.innerHTML = '';
  specialPeople.forEach((person, idx) => {
    const div = document.createElement('div');
    div.className = 'special-person';
    div.innerHTML = `
      <div class="special-person-top">
        <input class="person-name-input" type="text" value="${person.name}" placeholder="名前"
          oninput="specialPeople[${idx}].name = this.value">
        <button class="remove-btn" onclick="removePerson(${person.id})">✕</button>
      </div>
      <div class="slider-row">
        <span class="slider-label">倍率</span>
        <input type="range" min="1.0" max="5.0" step="0.1" value="${person.ratio}"
          style="accent-color:var(--accent)"
          oninput="specialPeople[${idx}].ratio = parseFloat(this.value); this.nextElementSibling.textContent = parseFloat(this.value).toFixed(1) + 'x'">
        <span class="slider-val">${person.ratio.toFixed(1)}x</span>
      </div>
    `;
    container.appendChild(div);
  });
}

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function calculate() {
  const total = parseFloat(document.getElementById('total').value) || 0;
  const people = parseInt(document.getElementById('people').value) || 0;

  if (total <= 0 || people <= 0) {
    alert('合計金額と参加人数を入力してください。');
    return;
  }

  // 有効な特別負担者（人数以内）
  const validSpecial = specialPeople.slice(0, people - 1);
  const normalCount = people - validSpecial.length;

  // 合計「口数」
  const totalUnits = normalCount * 1.0 + validSpecial.reduce((s, p) => s + p.ratio, 0);
  const unitPrice = total / totalUnits;
  const normalAmount = Math.ceil(unitPrice / 10) * 10; // 10円単位切り上げ

  // 特別負担者の金額
  const specialAmounts = validSpecial.map(p => Math.ceil(unitPrice * p.ratio / 10) * 10);

  // 端数
  const collectedTotal = normalCount * normalAmount + specialAmounts.reduce((s, a) => s + a, 0);
  const diff = collectedTotal - total;

  // ── 結果表示 ──
  document.getElementById('res-total').textContent = fmt(total);
  document.getElementById('res-people').textContent = people + ' 人';
  document.getElementById('res-normal').textContent = fmt(normalAmount);
  document.getElementById('res-count').textContent = `一般参加者 ${normalCount} 名`;
  document.getElementById('rounding-note').textContent =
    diff >= 0 ? `※ 端数調整 +${fmt(diff)} の余り（幹事預かりなど）`
              : `※ 端数 ${fmt(Math.abs(diff))} 不足（幹事が調整）`;

  // 人別リスト
  const listEl = document.getElementById('person-list');
  listEl.innerHTML = '';

  const allEntries = [];
  // 一般参加者まとめ
  allEntries.push({ name: `一般参加者（${normalCount}名）`, amount: normalAmount, pct: (normalAmount / total * normalCount), color: COLORS[0], isNormal: true, count: normalCount });
  // 特別負担者
  validSpecial.forEach((p, i) => {
    allEntries.push({ name: p.name, amount: specialAmounts[i], ratio: p.ratio, color: COLORS[i + 1] || COLORS[0], isNormal: false });
  });

  allEntries.forEach(e => {
    const row = document.createElement('div');
    row.className = 'person-result';
    const totalPaid = e.isNormal ? e.amount * e.count : e.amount;
    const pct = (totalPaid / collectedTotal * 100).toFixed(1);
    row.innerHTML = `
      <div class="pr-left">
        <div class="pr-dot" style="background:${e.color}"></div>
        <div>
          <div class="pr-name">${e.name}${!e.isNormal ? ` <span class="pr-tag">${e.ratio.toFixed(1)}x</span>` : ''}</div>
          ${e.isNormal ? `<div style="font-size:11px;color:var(--text-muted)">1人あたり ${fmt(e.amount)}</div>` : ''}
        </div>
      </div>
      <div class="pr-right">
        <div class="pr-amount" style="color:${e.color}">${e.isNormal ? fmt(e.amount) : fmt(e.amount)}</div>
        <div class="pr-pct">全体の ${pct}%${e.isNormal ? ` × ${e.count}人` : ''}</div>
      </div>
    `;
    listEl.appendChild(row);
  });

  // ── 円グラフ ──
  const canvas = document.getElementById('pie-canvas');
  const ctx = canvas.getContext('2d');
  const cx = 90, cy = 90, r = 80, ir = 44;

  // データ
  const pieData = [];
  pieData.push({ label: `一般 (${normalCount}名)`, value: normalAmount * normalCount, color: COLORS[0] });
  validSpecial.forEach((p, i) => {
    pieData.push({ label: p.name, value: specialAmounts[i], color: COLORS[i + 1] || COLORS[0] });
  });
  const pieTotal = pieData.reduce((s, d) => s + d.value, 0);

  ctx.clearRect(0, 0, 180, 180);

  let startAngle = -Math.PI / 2;
  pieData.forEach((d, i) => {
    const slice = (d.value / pieTotal) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    startAngle += slice;
  });

  // ドーナツ中抜き
  ctx.beginPath();
  ctx.arc(cx, cy, ir, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1928';
  ctx.fill();

  // 中央テキスト
  ctx.fillStyle = '#fffffe';
  ctx.font = 'bold 11px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(people + '人', cx, cy - 7);
  ctx.font = '10px Noto Sans JP, sans-serif';
  ctx.fillStyle = '#a7a9be';
  ctx.fillText('参加者', cx, cy + 8);

  // 凡例
  const legendEl = document.getElementById('chart-legend');
  legendEl.innerHTML = '';
  pieData.forEach(d => {
    const pct = (d.value / pieTotal * 100).toFixed(1);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-dot" style="background:${d.color}"></div>
      <span style="min-width:90px">${d.label}</span>
      <span class="legend-pct" style="color:${d.color}">${pct}%</span>
    `;
    legendEl.appendChild(item);
  });

  // ── 経費精算メモ ──
  const expenseEl = document.getElementById('expense-rows');
  expenseEl.innerHTML = '';

  const expRows = [];
  expRows.push({ label: `一般参加者 × ${normalCount}名`, value: normalAmount });
  validSpecial.forEach((p, i) => {
    expRows.push({ label: `${p.name}（${p.ratio.toFixed(1)}倍）`, value: specialAmounts[i] });
  });
  expRows.push({ label: '飲食店合計', value: total });

  expRows.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'expense-row';
    if (i === expRows.length - 1) {
      row.style.borderTop = '1px solid rgba(6,214,160,0.2)';
      row.style.marginTop = '4px';
      row.style.paddingTop = '8px';
      row.style.fontWeight = '700';
    }
    row.innerHTML = `<span>${r.label}</span><span>${fmt(r.value)}</span>`;
    expenseEl.appendChild(row);
  });

  // 表示
  const sec = document.getElementById('result-section');
  sec.style.display = 'block';
  setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

// 初期サンプル
document.getElementById('total').value = 50000;
document.getElementById('people').value = 8;
addPerson();
</script>

</body>
</html>
