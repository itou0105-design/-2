<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飲み会 割り勘計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 基本設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f0e17; /* 真っ黒に見える原因の背景色 */
            color: #fffffe;           /* 文字色（白） */
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            padding: 24px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header { text-align: center; margin-bottom: 30px; }
        .badge { background: #ff6b35; color: white; font-size: 10px; padding: 4px 12px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        h1 { font-size: 28px; font-weight: 900; }
        h1 span { color: #ff6b35; }

        /* カードデザイン */
        .card {
            background: #1a1928;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title { font-size: 11px; color: #a7a9be; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 3px; height: 12px; background: #ff6b35; }

        /* 入力エリア */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 12px; color: #a7a9be; margin-bottom: 6px; }
        
        input[type="number"], input[type="text"] {
            width: 100%;
            background: #22213a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 18px;
            font-family: 'Space Mono', monospace;
            outline: none;
        }

        /* 特別負担者（上司など） */
        .special-person {
            background: #22213a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .sp-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .remove-btn { background: none; border: none; color: #ff4757; font-size: 18px; cursor: pointer; }
        
        /* ボタン */
        .add-btn { background: none; border: 1px solid #ff6b35; color: #ff6b35; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .calc-btn { width: 100%; background: #ff6b35; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; margin: 10px 0 20px; cursor: pointer; }

        /* 結果表示 */
        #result-section { display: none; }
        .res-box { background: #22213a; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        .res-label { font-size: 12px; color: #a7a9be; }
        .res-val { font-size: 28px; font-weight: bold; color: #ffd23f; font-family: 'Space Mono'; }

        /* グラフ用 */
        .chart-area { text-align: center; padding: 20px 0; }
        canvas { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="badge">🍺 NOMIKAI CALC</div>
        <h1>飲み会<span>割り勘</span>機</h1>
    </header>

    <div class="card">
        <div class="card-title">基本設定</div>
        <div class="input-row">
            <div>
                <label>合計金額 (円)</label>
                <input type="number" id="total" value="50000" inputmode="numeric">
            </div>
            <div>
                <label>参加人数 (人)</label>
                <input type="number" id="people" value="8" inputmode="numeric">
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div class="card-title" style="margin:0">多めに払う人</div>
            <button class="add-btn" onclick="addPerson()">＋ 追加</button>
        </div>
        <div id="special-list"></div>
    </div>
